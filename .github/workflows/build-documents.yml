name: Build Documents

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  style-check:
    name: Brand & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.10"

      - name: Brand drift check
        run: uv run python style/generate_style.py --check

      - name: Test suite
        run: uv run pytest tests/ -q

  build-documents:
    name: Build All Documents
    runs-on: ubuntu-latest
    needs: style-check
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build . -t pandoc_all

      - name: Build book
        run: STRICT_WARNINGS=1 ./scripts/build_in_container.sh book
        env:
          CONTAINER_RUNTIME: docker

      - name: Build beamer
        run: STRICT_WARNINGS=1 ./scripts/build_in_container.sh beamer
        env:
          CONTAINER_RUNTIME: docker

      - name: Build pptx
        run: STRICT_WARNINGS=1 ./scripts/build_in_container.sh pptx
        env:
          CONTAINER_RUNTIME: docker

      - name: Build CV (English)
        run: STRICT_WARNINGS=1 CV_LANG=english ./scripts/build_in_container.sh cv
        env:
          CONTAINER_RUNTIME: docker

      - name: Build CV (German)
        run: STRICT_WARNINGS=1 CV_LANG=german ./scripts/build_in_container.sh cv
        env:
          CONTAINER_RUNTIME: docker

      - name: Upload artifacts
        uses: actions/upload-artifact@v5.0.0
        with:
          name: documents
          path: |
            data/out/book_output.pdf
            data/out/beamer_output.pdf
            data/out/presentation.pptx
            data/out/CV_Jonas_Heinle_english.pdf
            data/out/CV_Jonas_Heinle_german.pdf
          retention-days: 30
