name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.10"

      # Dev tools (ruff, ty, pytest) are pinned in the uv lockfile; `uv run
      # --extra dev` installs exactly those versions so lint is reproducible.
      - name: Ruff check
        run: uv run --extra dev ruff check md2pdfLib/ build.py docs/conf.py docs-tooling/ sphinx-kataglyphis-theme/ style/ tests/

      - name: Ruff format check
        run: uv run --extra dev ruff format --check md2pdfLib/ build.py docs/conf.py docs-tooling/ sphinx-kataglyphis-theme/ style/ tests/

      - name: Type check
        run: uv run --extra dev ty check md2pdfLib/ style/ sphinx-kataglyphis-theme/

      - name: Brand style in sync with style/brand.json
        run: uv run python style/generate_style.py --check

      - name: Tests
        run: uv run --extra dev pytest

      - name: Shell syntax check
        run: bash -n md2pdfLib/scripts/compile_with_glossaries.sh scripts/build_in_container.sh

  docs:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.10"

      - name: Build Sphinx docs
        run: uv run --extra docs sphinx-build -W -b html docs docs/_build/html

  build-and-verify:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    env:
      CONTAINER_RUNTIME: docker
      IMAGE: pandoc_all
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          submodules: recursive

      # The image is NOT built here -- publish-image.yml builds and pushes it
      # to GHCR whenever the Dockerfile (or its inputs) changes; every other
      # push just pulls the prebuilt image. If a push changes the Dockerfile,
      # publish-image.yml runs on the same commit -- re-run this job after it
      # finishes to verify against the fresh image.
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull prebuilt pandoc_all image
        run: |
          ref="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/pandoc_all:latest"
          docker pull "$ref"
          docker tag "$ref" pandoc_all

      # The reference-deck integration tests need pandoc, which lives only in
      # the image -- on the host they skip, so without this step the assumption
      # the pptx patchers rest on (pandoc's actual deck layout) is never tested
      # anywhere. Runs just the pandoc-dependent module inside the container.
      # UV_PROJECT_ENVIRONMENT keeps the container's venv OUT of the mounted
      # checkout -- writing into ./.venv would leave container-path shebangs
      # behind and break the host's environment for anyone running this
      # command locally.
      - name: Test against pandoc's real reference deck (in-container)
        run: |
          docker run --rm --entrypoint "" -v "$PWD:/repo" -w /repo \
            -e UV_PROJECT_ENVIRONMENT=/tmp/ci-venv pandoc_all \
            sh -c '. /md2pdf/bin/activate && uv run --extra dev pytest tests/test_pptx_reference.py -q'

      - name: Build book with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh book

      # Strict, like the others: the presentation was the one document CI did
      # not gate, which is how 81 missing λ/∑ glyphs shipped unnoticed.
      - name: Build presentation with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh beamer

      - name: Build pptx presentation with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh pptx

      # Both published variants. The German one is built from the same sources
      # via the class language option, so a section edited in only one language
      # -- or German text that overruns a column the English text fits -- fails
      # here rather than on jonasheinle.de.
      - name: Build English CV with strict warnings
        run: STRICT_WARNINGS=1 CV_LANG=english bash ./scripts/build_in_container.sh cv

      - name: Build German CV with strict warnings
        run: STRICT_WARNINGS=1 CV_LANG=german bash ./scripts/build_in_container.sh cv
