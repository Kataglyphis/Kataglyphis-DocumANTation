name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      # Dev tools (ruff, ty, pytest) are pinned in the uv lockfile; `uv run
      # --extra dev` installs exactly those versions so lint is reproducible.
      - name: Ruff check
        run: uv run --extra dev ruff check md2pdfLib/ build.py docs/conf.py docs-tooling/ sphinx-kataglyphis-theme/ style/ tests/

      - name: Ruff format check
        run: uv run --extra dev ruff format --check md2pdfLib/ build.py docs/conf.py docs-tooling/ sphinx-kataglyphis-theme/ style/ tests/

      - name: Type check
        run: uv run --extra dev ty check md2pdfLib/

      - name: Brand style in sync with style/brand.json
        run: uv run python style/generate_style.py --check

      - name: Tests
        run: uv run --extra dev pytest

      - name: Shell syntax check
        run: bash -n md2pdfLib/scripts/compile_with_glossaries.sh scripts/build_in_container.sh scripts/build_book_with_glossaries_in_container.sh

  docs:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Build Sphinx docs
        run: uv run --extra docs sphinx-build -W -b html docs docs/_build/html

  build-and-verify:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CONTAINER_RUNTIME: docker
      IMAGE: pandoc_all
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build . -t pandoc_all

      - name: Build book with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh book

      - name: Build presentation
        run: bash ./scripts/build_in_container.sh beamer

      - name: Build CV with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh cv
