name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Install dev tools
        run: uv pip install ruff ty

      - name: Ruff check
        run: uv run ruff check md2pdfLib/ build.py docs/conf.py

      - name: Ruff format check
        run: uv run ruff format --check md2pdfLib/ build.py docs/conf.py

      - name: Type check
        run: uv run ty check md2pdfLib/

      - name: Shell syntax check
        run: bash -n md2pdfLib/scripts/compile_with_glossaries.sh scripts/build_in_container.sh scripts/build_book_with_glossaries_in_container.sh

  docs:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Build Sphinx docs
        run: uv run --extra docs sphinx-build -W -b html docs docs/_build/html

  build-and-verify:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CONTAINER_RUNTIME: docker
      IMAGE: pandoc_all
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build . -t pandoc_all

      - name: Build book with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh book

      - name: Build presentation
        run: bash ./scripts/build_in_container.sh beamer

      - name: Build CV with strict warnings
        run: STRICT_WARNINGS=1 bash ./scripts/build_in_container.sh cv
