<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- T3: WIREFRAME 3D — ant as a low-poly mesh (computer graphics reference) -->
  <g transform="translate(256,260)" fill="none" stroke="#145a3c" stroke-width="1.2">
    <!-- Head (icosphere-like wireframe) -->
    <polygon points="0,-97 -18,-82 -12,-65 12,-65 18,-82" stroke="#2ad488" stroke-width="1.5"/>
    <polygon points="0,-97 -18,-82 0,-90" opacity="0.5"/>
    <polygon points="0,-97 18,-82 0,-90" opacity="0.5"/>
    <line x1="-18" y1="-82" x2="18" y2="-82" opacity="0.6"/>
    <polygon points="-18,-82 -26,-72 -12,-65" opacity="0.4"/>
    <polygon points="18,-82 26,-72 12,-65" opacity="0.4"/>
    <line x1="-12" y1="-65" x2="12" y2="-65" opacity="0.5"/>
    <!-- Vertex dots -->
    <g fill="#2ad488" stroke="none">
      <circle cx="0" cy="-97" r="2.5"/><circle cx="-18" cy="-82" r="2"/>
      <circle cx="18" cy="-82" r="2"/><circle cx="-12" cy="-65" r="2"/>
      <circle cx="12" cy="-65" r="2"/><circle cx="0" cy="-90" r="1.5"/>
    </g>

    <!-- Eyes (filled green polygons) -->
    <polygon points="-14,-82 -20,-76 -14,-70 -8,-76" fill="#2ad488" stroke="none" opacity="0.7"/>
    <polygon points="14,-82 20,-76 14,-70 8,-76" fill="#2ad488" stroke="none" opacity="0.7"/>

    <!-- Thorax (wireframe ellipsoid) -->
    <ellipse cx="0" cy="-25" rx="28" ry="30"/>
    <line x1="-28" y1="-25" x2="28" y2="-25" opacity="0.3"/>
    <ellipse cx="0" cy="-25" rx="28" ry="12" opacity="0.3"/>
    <ellipse cx="0" cy="-25" rx="12" ry="30" opacity="0.3"/>
    <!-- Cross-sections -->
    <line x1="-20" y1="-45" x2="20" y2="-45" opacity="0.2"/>
    <line x1="-24" y1="-10" x2="24" y2="-10" opacity="0.2"/>
    <g fill="#145a3c" stroke="none">
      <circle cx="-28" cy="-25" r="1.5"/><circle cx="28" cy="-25" r="1.5"/>
      <circle cx="0" cy="-55" r="1.5"/><circle cx="0" cy="5" r="1.5"/>
    </g>

    <!-- Petiole (small wireframe node) -->
    <polygon points="0,-2 -10,8 0,18 10,8" stroke="#2ad488"/>
    <circle cx="0" cy="8" r="1.5" fill="#2ad488" stroke="none"/>

    <!-- Abdomen (larger wireframe ellipsoid) -->
    <ellipse cx="0" cy="65" rx="42" ry="55"/>
    <ellipse cx="0" cy="65" rx="42" ry="20" opacity="0.3"/>
    <ellipse cx="0" cy="65" rx="20" ry="55" opacity="0.3"/>
    <ellipse cx="0" cy="65" rx="35" ry="40" opacity="0.15" transform="rotate(30)"/>
    <ellipse cx="0" cy="65" rx="35" ry="40" opacity="0.15" transform="rotate(-30)"/>
    <!-- Latitude lines -->
    <line x1="-40" y1="40" x2="40" y2="40" opacity="0.2"/>
    <line x1="-42" y1="65" x2="42" y2="65" opacity="0.2"/>
    <line x1="-40" y1="90" x2="40" y2="90" opacity="0.2"/>
    <g fill="#145a3c" stroke="none">
      <circle cx="-42" cy="65" r="1.5"/><circle cx="42" cy="65" r="1.5"/>
      <circle cx="0" cy="10" r="1.5"/><circle cx="0" cy="120" r="1.5"/>
    </g>

    <!-- Antennae (wireframe paths) -->
    <path d="M-12,-92 L-30,-115 L-55,-140 L-70,-152 L-82,-156" stroke="#2ad488" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M12,-92 L30,-115 L55,-140 L70,-152 L82,-156" stroke="#2ad488" stroke-width="1.5" stroke-linecap="round"/>
    <g fill="#2ad488" stroke="none">
      <circle cx="-30" cy="-115" r="2"/><circle cx="-55" cy="-140" r="2"/>
      <circle cx="-70" cy="-152" r="2"/><circle cx="-82" cy="-156" r="3"/>
      <circle cx="30" cy="-115" r="2"/><circle cx="55" cy="-140" r="2"/>
      <circle cx="70" cy="-152" r="2"/><circle cx="82" cy="-156" r="3"/>
    </g>

    <!-- Legs (wireframe with joint vertices) -->
    <g stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-20,-35 L-55,-60 L-90,-45 L-120,-55"/>
      <path d="M20,-35 L55,-60 L90,-45 L120,-55"/>
      <path d="M-25,-15 L-65,-15 L-100,5 L-135,0"/>
      <path d="M25,-15 L65,-15 L100,5 L135,0"/>
      <path d="M-20,30 L-60,55 L-95,95 L-130,120"/>
      <path d="M20,30 L60,55 L95,95 L130,120"/>
    </g>
    <!-- Joint vertices -->
    <g fill="#145a3c" stroke="none">
      <circle cx="-55" cy="-60" r="2"/><circle cx="-90" cy="-45" r="2"/><circle cx="-120" cy="-55" r="2"/>
      <circle cx="55" cy="-60" r="2"/><circle cx="90" cy="-45" r="2"/><circle cx="120" cy="-55" r="2"/>
      <circle cx="-65" cy="-15" r="2"/><circle cx="-100" cy="5" r="2"/><circle cx="-135" cy="0" r="2"/>
      <circle cx="65" cy="-15" r="2"/><circle cx="100" cy="5" r="2"/><circle cx="135" cy="0" r="2"/>
      <circle cx="-60" cy="55" r="2"/><circle cx="-95" cy="95" r="2"/><circle cx="-130" cy="120" r="2"/>
      <circle cx="60" cy="55" r="2"/><circle cx="95" cy="95" r="2"/><circle cx="130" cy="120" r="2"/>
    </g>
  </g>

  <!-- Vertex/face count (like a 3D editor HUD) -->
  <g font-family="monospace" font-size="9" fill="#145a3c" opacity="0.35">
    <text x="30" y="30">verts: 48 | faces: 72</text>
    <text x="30" y="42">mesh: cataglyphis.obj</text>
  </g>

  <!-- Name plate (bottom center, like a viewport label) -->
  <text x="256" y="478" font-family="Roboto, sans-serif" font-size="28" font-weight="300"
    fill="#145a3c" text-anchor="middle" letter-spacing="10" opacity="0.7">KATAGLYPHIS</text>
  <!-- Accent underline -->
  <line x1="130" y1="488" x2="382" y2="488" stroke="#2ad488" stroke-width="1.5" opacity="0.4"/>
</svg>
