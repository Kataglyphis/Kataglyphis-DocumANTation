[project]
name = "sphinx-kataglyphis-theme"
version = "0.1.0"
description = "Reusable Sphinx theme config + CSS for Kataglyphis documentation sites"
requires-python = ">=3.10"
dependencies = [
    "sphinx>=7",
    "sphinx-book-theme>=1",
    "myst-parser>=3",
    "sphinx-design>=0.6",
    "pygments>=2.17",
]

# Register the shared Kataglyphis code palette as real Pygments styles, so the
# website highlights code the same way the book and slides do. Generated from
# style/brand.json -- see sphinx_kataglyphis/highlight.py.
[project.entry-points."pygments.styles"]
kataglyphis-light = "sphinx_kataglyphis.highlight:KataglyphisLightStyle"
kataglyphis-dark = "sphinx_kataglyphis.highlight:KataglyphisDarkStyle"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["sphinx_kataglyphis"]

[tool.setuptools.package-data]
# brand.tokens.json is generated from style/brand.json; shipping it lets any
# installing project read the brand instead of copying values.
sphinx_kataglyphis = ["_static/css/*.css", "brand.tokens.json"]
